name: Reproducible Build Check

on:
  push:
    branches: [ "staging" ]

jobs:
  build-1:
    name: Build 1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ci
        run: docker build -t deku_rep_build_release .

      - name: Build APK
        run: |
          docker run --rm \
            -v "$(pwd)":/project \
            -w /project \
            --user "$(id -u):$(id -g)" \
            -e ANDROID_USER_HOME=/project/.android \
            -e GRADLE_USER_HOME=/project/.gradle \
            deku_rep_build_release \
            ./gradlew assembleRelease \
              --no-daemon \
              --max-workers=2 \
              --console=plain \
              -Dorg.gradle.jvmargs="-Xmx2048m -Xms512m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8" \
              -Dkotlin.daemon.jvm.options="-Xmx512m,-Xss1m" \
              -Dkotlin.compiler.execution.strategy=in-process

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-build-1
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 1

  build-2:
    name: Build 2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ci
        run: docker build -t deku_rep_build_release .

      - name: Build APK
        run: |
          docker run --rm \
            -v "$(pwd)":/project \
            -w /project \
            --user "$(id -u):$(id -g)" \
            -e ANDROID_USER_HOME=/project/.android \
            -e GRADLE_USER_HOME=/project/.gradle \
            deku_rep_build_release \
            ./gradlew assembleRelease \
              --no-daemon \
              --max-workers=2 \
              --console=plain \
              -Dorg.gradle.jvmargs="-Xmx2048m -Xms512m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8" \
              -Dkotlin.daemon.jvm.options="-Xmx512m,-Xss1m" \
              -Dkotlin.compiler.execution.strategy=in-process

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-build-2
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 1

  compare:
    name: Compare APKs
    runs-on: ubuntu-latest
    needs: [ build-1, build-2 ]
    steps:
      - name: Download APK from build 1
        uses: actions/download-artifact@v4
        with:
          name: apk-build-1
          path: apk-build-1

      - name: Download APK from build 2
        uses: actions/download-artifact@v4
        with:
          name: apk-build-2
          path: apk-build-2

      - name: Compare hashes
        run: |
          SHA1=$(sha256sum apk-build-1/app-release-unsigned.apk | awk '{ print $1 }')
          SHA2=$(sha256sum apk-build-2/app-release-unsigned.apk | awk '{ print $1 }')
          echo "Build 1: $SHA1"
          echo "Build 2: $SHA2"
          if [ "$SHA1" = "$SHA2" ]; then
            echo "Reproducible build verified — hashes match."
          else
            echo "Build is NOT reproducible — hashes differ! Run diffoscope"
            exit 1
          fi

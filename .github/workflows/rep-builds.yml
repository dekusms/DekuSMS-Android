name: Reproducible Build Check

on: [push, pull_request]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache Docker layers to make the second build instant for the environment
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # First Build
      - name: Build First APK
        uses: docker/build-push-action@v5
        with:
          context: .
          target: apk-builder
          tags: app:build-one
          outputs: type=docker,dest=/tmp/image1.tar
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Extract First APK
        run: |
          docker load -i /tmp/image1.tar
          docker run --name build1 app:build-one /bin/true
          docker cp build1:/android/app/build/outputs/apk/release/app-release-unsigned.apk ./build1.apk
          sha256sum build1.apk > hash1.txt

      # Second Build (Sequential to save RAM)
      - name: Build Second APK
        uses: docker/build-push-action@v5
        with:
          context: .
          target: apk-builder
          tags: app:build-two
          outputs: type=docker,dest=/tmp/image2.tar
          cache-from: type=local,src=/tmp/.buildx-cache-new # Use cache from run 1

      - name: Extract Second APK
        run: |
          docker load -i /tmp/image2.tar
          docker run --name build2 app:build-two /bin/true
          docker cp build2:/android/app/build/outputs/apk/release/app-release-unsigned.apk ./build2.apk
          sha256sum build2.apk > hash2.txt

      # The Comparison
      - name: Compare Hashes
        run: |
          echo "Build 1: $(cat hash1.txt)"
          echo "Build 2: $(cat hash2.txt)"
          diff hash1.txt hash2.txt || (echo "Reproducibility failed!" && exit 1)

      # Diagnostic: If they differ, show why (Optional but recommended)
      - name: Run Diffoscope on failure
        if: failure()
        run: |
          sudo apt-get update && sudo apt-get install -y diffoscope
          diffoscope build1.apk build2.apk || true

      # Cleanup cache
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

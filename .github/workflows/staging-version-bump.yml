name: Bump Version

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current branch name
        id: branch
        run: echo "name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Get latest tag
        id: previoustag
        uses: WyriHaximus/github-action-get-previous-tag@v2
        with:
          fallback: 0.0.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify versions.properties exists
        run: |
          if [ ! -f versions.properties ]; then
            echo "ERROR: versions.properties not found in ${{ github.workspace }}"
            ls -la
            exit 1
          fi
          echo "Found versions.properties:"
          cat versions.properties

      - name: Run bump_version.py
        id: bump
        run: |
          python bump_version.py \
            "${{ steps.previoustag.outputs.tag }}" \
            "${{ steps.branch.outputs.name }}" \
            > version.properties
          echo "result<<EOF" >> $GITHUB_OUTPUT
          cat version.properties >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit and push version.properties
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git diff --cached --quiet || git commit -m "chore: bump version [skip ci]"
          git push origin ${{ steps.branch.outputs.name }}

      - name: Open PR to master
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: ${{ steps.branch.outputs.name }}
          title: "chore: bump version (${{ steps.previoustag.outputs.tag }} → ${{ steps.branch.outputs.name }})"
          body: |
            ## Version Bump

            Automated version bump triggered by push to `${{ steps.branch.outputs.name }}`.

            | Field        | Value |
            |--------------|-------|
            | Previous tag | `${{ steps.previoustag.outputs.tag }}` |
            | Branch       | `${{ steps.branch.outputs.name }}` |

            **`version.properties` contents:**
            ```
            ${{ steps.bump.outputs.result }}
            ```
          labels: automated, version-bump
          draft: false
